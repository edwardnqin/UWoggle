# PROJECT_25/backend/.gitlab-ci.yml

.backend_base:
  image: python:3.12
  rules:
    - changes:
        - backend/**/*.py
        - backend/requirements.txt
        - backend/.gitlab-ci.yml
        - .gitlab-ci.yml
  before_script:
    - python3 -m pip install --upgrade pip
    - pip install ruff
    - pip install -r backend/requirements.txt
    - pip install pytest-cov

backend-lint:
  extends: .backend_base
  stage: lint
  script:
    - cd backend
    - ruff check .

backend-test:
  extends: .backend_base
  stage: test
  coverage: '/TOTAL.*\s+(\d+%)$/'
  script:
    - cd backend
    - export DATABASE_URL="sqlite:///:memory:"
    - export PYTHONPATH=.
    - pytest tests/ -v --cov=. --cov-report=term-missing